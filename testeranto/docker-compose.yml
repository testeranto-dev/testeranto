services:
  nodetests-builder:
    container_name: nodetests-builder
    environment:
      NODE_ENV: production
      ENV: node
      MODE: once
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/dist:/workspace/dist
      - /Users/adam/Code/testeranto/testeranto:/workspace/testeranto
    command: yarn tsx /workspace/testeranto/node_runtime.ts /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/node/node.mjs '{"name":"nodetests","tests":["src/vscode/providers/logic/FileTreeLogic.test.ts"],"outputs":[]}'
    networks:
      - allTests_network
    restart: 'no'
    image: testeranto-node-nodetests:latest
    extra_hosts:
      - host.docker.internal:host-gateway
  nodetests-src_vscode_providers_logic_filetreelogic-test-ts-bdd:
    build:
      context: /Users/adam/Code/testeranto
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: nodetests-src_vscode_providers_logic_filetreelogic-test-ts-bdd
    environment: {}
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/test:/workspace/test
      - /Users/adam/Code/testeranto/testeranto:/workspace/testeranto
    command: yarn tsx testeranto/bundles/nodetests/src/vscode/providers/logic/FileTreeLogic.test.mjs '{"ports":[1111],"fs":"testeranto/reports/nodetests/src/vscode/providers/logic/FileTreeLogic.test.ts/"}'
    networks:
      - allTests_network
    restart: 'no'
    extra_hosts:
      - host.docker.internal:host-gateway
  nodetests-src_vscode_providers_logic_filetreelogic-test-ts-aider:
    image: testeranto-aider:latest
    container_name: nodetests-src_vscode_providers_logic_filetreelogic-test-ts-aider
    environment:
      NODE_ENV: production
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/test:/workspace/test
      - /Users/adam/Code/testeranto/testeranto:/workspace/testeranto
      - /Users/adam/Code/testeranto/.aider.conf.yml:/workspace/.aider.conf.yml
      - /Users/adam/Code/testeranto:/workspace
    working_dir: /workspace
    command: tail -f /dev/null
    networks:
      - allTests_network
    tty: true
    stdin_open: true
    restart: 'no'
    extra_hosts:
      - host.docker.internal:host-gateway
  nodetests-src_vscode_providers_logic_filetreelogic-test-ts-check-0:
    build:
      context: /Users/adam/Code/testeranto
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: nodetests-src_vscode_providers_logic_filetreelogic-test-ts-check-0
    environment: {}
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/test:/workspace/test
      - /Users/adam/Code/testeranto/testeranto:/workspace/testeranto
    command: 'yarn eslint  '
    networks:
      - allTests_network
    restart: 'no'
    extra_hosts:
      - host.docker.internal:host-gateway
  nodetests-src_vscode_providers_logic_filetreelogic-test-ts-check-1:
    build:
      context: /Users/adam/Code/testeranto
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: nodetests-src_vscode_providers_logic_filetreelogic-test-ts-check-1
    environment: {}
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/test:/workspace/test
      - /Users/adam/Code/testeranto/testeranto:/workspace/testeranto
    command: 'yarn tsc --noEmit '
    networks:
      - allTests_network
    restart: 'no'
    extra_hosts:
      - host.docker.internal:host-gateway
  nodetests-src_vscode_providers_logic_filetreelogic-test-ts-check-2:
    build:
      context: /Users/adam/Code/testeranto
      dockerfile: testeranto/runtimes/node/node.Dockerfile
    container_name: nodetests-src_vscode_providers_logic_filetreelogic-test-ts-check-2
    environment: {}
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/test:/workspace/test
      - /Users/adam/Code/testeranto/testeranto:/workspace/testeranto
    command: echo 'No calculator test found'
    networks:
      - allTests_network
    restart: 'no'
    extra_hosts:
      - host.docker.internal:host-gateway
  agent-prodirek:
    image: testeranto-aider:latest
    container_name: agent-prodirek
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/test:/workspace/test
      - /Users/adam/Code/testeranto:/workspace
      - /Users/adam/Code/testeranto/testeranto/agents:/workspace/agents:ro
      - /Users/adam/Code/testeranto/.aider.conf.yml:/workspace/.aider.conf.yml
    working_dir: /workspace
    command:
      - sh
      - '-c'
      - |-
        # Create symlink for agent markdown file
                 if [ -f "/workspace/agents/prodirek.md" ]; then
                   ln -sf "/workspace/agents/prodirek.md" /workspace/agent.md
                   echo "Created symlink to agent markdown file at /workspace/agent.md"
                 else
                   echo "Agent markdown file not found at /workspace/agents/prodirek.md"
                   touch /workspace/agent.md
                 fi
                 
                 # Start aider and keep it running
                 echo "Starting aider for agent prodirek"
                 cat /workspace/agent.md - | aider --no-analytics --no-show-model-warnings --no-show-release-notes --no-check-update 2>&1
                 EXIT_CODE=$?
                 echo "Aider exited with code $EXIT_CODE"
                 # Exit with the same code (no restart)
                 exit $EXIT_CODE
    environment:
      MODE: once
      NODE_ENV: production
      AGENT_MARKDOWN_FILE: /workspace/agents/prodirek.md
      EDITOR: vim
    restart: 'no'
    networks:
      - allTests_network
    tty: true
    stdin_open: true
    extra_hosts:
      - host.docker.internal:host-gateway
  agent-arko:
    image: testeranto-aider:latest
    container_name: agent-arko
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/test:/workspace/test
      - /Users/adam/Code/testeranto:/workspace
      - /Users/adam/Code/testeranto/testeranto/agents:/workspace/agents:ro
      - /Users/adam/Code/testeranto/.aider.conf.yml:/workspace/.aider.conf.yml
    working_dir: /workspace
    command:
      - sh
      - '-c'
      - |-
        # Create symlink for agent markdown file
                 if [ -f "/workspace/agents/arko.md" ]; then
                   ln -sf "/workspace/agents/arko.md" /workspace/agent.md
                   echo "Created symlink to agent markdown file at /workspace/agent.md"
                 else
                   echo "Agent markdown file not found at /workspace/agents/arko.md"
                   touch /workspace/agent.md
                 fi
                 
                 # Start aider and keep it running
                 echo "Starting aider for agent arko"
                 cat /workspace/agent.md - | aider --no-analytics --no-show-model-warnings --no-show-release-notes --no-check-update 2>&1
                 EXIT_CODE=$?
                 echo "Aider exited with code $EXIT_CODE"
                 # Exit with the same code (no restart)
                 exit $EXIT_CODE
    environment:
      MODE: once
      NODE_ENV: production
      AGENT_MARKDOWN_FILE: /workspace/agents/arko.md
      EDITOR: vim
    restart: 'no'
    networks:
      - allTests_network
    tty: true
    stdin_open: true
    extra_hosts:
      - host.docker.internal:host-gateway
volumes:
  node_modules:
    driver: local
networks:
  allTests_network:
    driver: bridge
