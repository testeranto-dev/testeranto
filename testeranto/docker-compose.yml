services:
  nodetests-builder:
    container_name: nodetests-builder
    environment:
      NODE_ENV: production
      ENV: node
      MODE: dev
    working_dir: /workspace
    volumes:
      - /Users/adam/Code/testeranto/src:/workspace/src
      - /Users/adam/Code/testeranto/dist:/workspace/dist
      - /Users/adam/Code/testeranto/testeranto:/workspace/testeranto
    command: yarn tsx /workspace/testeranto/node_runtime.ts /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/node/node.mjs nodetests src/lib/tiposkripto/tests/calculator/Calculator.test.node.ts src/lib/tiposkripto/tests/circle/Circle.test.ts
    networks:
      - allTests_network
    restart: 'no'
    image: testeranto-node-nodetests:latest
  nodetests-src_lib_tiposkripto_tests_calculator_calculator-test-node-ts-bdd:
    build:
      context: /Users/adam/Code/testeranto
