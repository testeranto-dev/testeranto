services:
  nodetests-builder:
    container_name: "nodetests-builder"
    environment:
      NODE_ENV: production
      ENV: node
      MODE: dev
    working_dir: /workspace
    volumes:
      - "/Users/adam/Code/testeranto/src:/workspace/src"
      - "/Users/adam/Code/testeranto/dist:/workspace/dist"
      - "/Users/adam/Code/testeranto/testeranto:/workspace/testeranto"
    command: "yarn tsx /workspace/testeranto/node_runtime.ts /workspace/testeranto/testeranto.ts /workspace/testeranto/runtimes/node/node.mjs '{\"name\":\"nodetests\",\"tests\":[\"src/lib/tiposkripto/tests/abstractBase.test/index.ts\",\"src/lib/tiposkripto/tests/calculator/Calculator.test.node.ts\",\"src/lib/tiposkripto/tests/circle/Circle.test.ts\",\"src/lib/tiposkripto/tests/Rectangle/Rectangle.test.ts\",\"src/vscode/providers/AiderProcessTreeDataProvider.test/AiderProcessTreeDataProvider.test.ts\"],\"outputs\":[]}'"
    networks:
      - allTests_network
    restart: no
    image: "testeranto-node-nodetests:latest"
    extra_hosts:
      host.docker.internal: "host-gateway"
  webtests-builder:
    container_name: "webtests-builder"
    environment:
      NODE_ENV: production
      ENV: web
      MODE: dev
    working_dir: /workspace
