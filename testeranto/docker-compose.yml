    working_dir: /workspace
    command:
      - sh
      - '-c'
      - |-
        # Create agent instructions file from config
                 echo "Creating agent instructions for prodirek"
                   
                 # Create the instruction file with content from config
                cat > /tmp/agent_load.txt << 'EOF'
        /read SOUL.md
        /read testeranto/slices/agents/prodirek.json
        /read testeranto/agents/prodirek.md
        EOF
           

                 # Create the instruction file with content from config
                cat > /tmp/agent_message.txt << 'EOF'
        Your name is "prodirek". You are a Product Manager. Your responsibilities are: Groom features, tickets and documentation. Use these docs to maintain the "specifications" for tests. You don't need to worry about the code or the other test files- your job is to groom the specifications, keep them congruent with the docs. You can communicate with other agents through the graph: Chat messages are added to the graph when aider blocks complete. Your slice data (available in 'YOU_NAME.json') includes other agents' messages as chat_message nodes. You can post a message by curling the endpoint: curl -X POST http://host.docker.internal:3000/~/chat -H "Content-Type: application/json" -d '{"agentName": "prodirek", "content": "Hello from prodirek!"}'. Learn more about yourself at http://host.docker.internal:3000/~/agents/prodirek
        EOF

                 echo "Starting aider for agent prodirek with instructions from config"
                 aider --load /tmp/agent_load.txt --no-analytics --no-show-model-warnings --no-show-release-notes --no-check-update 2>&1
                 EXIT_CODE=$?
                 echo "Aider exited with code $EXIT_CODE"
                 # Exit with the same code (no restart)
                 exit $EXIT_CODE
    environment:
      MODE: dev
      NODE_ENV: production
      AGENT_NAME: prodirek
      EDITOR: vim
    restart: 'no'
    networks:
      - allTests_network
    tty: true
    stdin_open: true
    extra_hosts:
      - host.docker.internal:host-gateway
