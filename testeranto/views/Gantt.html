
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testeranto - Gantt View</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    #root {
      min-height: 100vh;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.2rem;
      color: #666;
    }
    .error {
      padding: 40px;
      text-align: center;
      color: #d32f2f;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <h2>Loading Gantt View...</h2>
    </div>
  </div>

  <script>
    // View configuration
    window.TESTERANTO_VIEW_CONFIG = {
      viewKey: 'Gantt',
      viewPath: 'testeranto/views/stakeholder/Gantt',
      dataPath: '/testeranto/slices/views/Gantt.json',
      apiEndpoint: '/~/api'
    };

    // Load the view bundle
    const script = document.createElement('script');
    script.src = '/testeranto/views/Gantt.bundle.js';
    script.onerror = function() {
      document.getElementById('root').innerHTML = `
        <div class="error">
          <h1>Error Loading View</h1>
          <p>Failed to load Gantt view bundle.</p>
          <p>Make sure the view has been properly compiled.</p>
        </div>
      `;
    };
    document.head.appendChild(script);
  </script>
</body>
</html>
