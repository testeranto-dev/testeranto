<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testeranto - Stakeholder Report</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }

    #root {
      min-height: 100vh;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="loading">
      <h2>Loading Testeranto Stakeholder Report...</h2>
    </div>
  </div>

  <script type="module">
    document.addEventListener('DOMContentLoaded', async function () {
      const root = document.getElementById('root');

      try {
        // Check for embedded data
        const embeddedData = window.TESTERANTO_EMBEDDED_DATA;
        if (!embeddedData) {
          throw new Error('No embedded data found. The server may not have generated the report properly.');
        }

        console.log('Loaded embedded data:', embeddedData);

        // Import the React app from the embedded bundle
        // Note: We need to ensure index.js is available at /testeranto/reports/index.js
        // But for now, we'll use a simple inline renderer if the import fails
        try {
          const { renderApp } = await import('/testeranto/reports/index.js');
          renderApp(root, embeddedData);
        } catch (importError) {
          console.warn('Could not import React app, using fallback renderer:', importError);
          // Fallback: render a simple view with the embedded data
          renderFallbackApp(root, embeddedData);
        }
      } catch (error) {
        console.error('Failed to load stakeholder report:', error);
        root.innerHTML = `
          <div style="padding: 40px; text-align: center;">
            <h1 style="color: #d32f2f;">Error Loading Report</h1>
            <p>${error.message}</p>
            <p>Please make sure the Testeranto server has generated the report files.</p>
            <details style="text-align: left; max-width: 800px; margin: 20px auto;">
              <summary>Technical Details</summary>
              <pre style="background: #f5f5f5; padding: 10px; overflow: auto;">${error.stack}</pre>
            </details>
          </div>
        `;
      }
    });


  </script>
</body>

</html>
