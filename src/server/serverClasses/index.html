<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testeranto - Stakeholder Report</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    #root {
      min-height: 100vh;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <h2>Loading Testeranto Stakeholder Report...</h2>
    </div>
  </div>

  <script type="module">
    document.addEventListener('DOMContentLoaded', async function () {
      const root = document.getElementById('root');
      
      try {
        // Import the bundled React app
        const { renderApp } = await import('./index.js');
        
        // Load data using embedded config
        const stakeholderData = await loadDataWithEmbeddedConfig();
        
        // Render the React app
        renderApp(root, stakeholderData);
      } catch (error) {
        console.error('Failed to load stakeholder report:', error);
        root.innerHTML = `
          <div style="padding: 40px; text-align: center;">
            <h1 style="color: #d32f2f;">Error Loading Report</h1>
            <p>${error.message}</p>
            <p>Please make sure the Testeranto server has generated the report files.</p>
            <details style="text-align: left; max-width: 800px; margin: 20px auto;">
              <summary>Technical Details</summary>
              <pre style="background: #f5f5f5; padding: 10px; overflow: auto;">${error.stack}</pre>
            </details>
          </div>
        `;
      }
    });

    async function loadDataWithEmbeddedConfig() {
      // Get the embedded config and documentation files from the HTML
      const configElement = document.getElementById('testeranto-config');
      if (!configElement) {
        throw new Error('No embedded configuration found in HTML');
      }
      
      let embeddedData;
      try {
        embeddedData = JSON.parse(configElement.textContent);
      } catch (error) {
        throw new Error(`Failed to parse embedded data: ${error.message}`);
      }
      
      const { configs, documentationFiles, featureTree } = embeddedData;
      console.log('Loaded embedded config:', configs);
      console.log('Loaded embedded documentation files:', documentationFiles);
      console.log('Loaded embedded feature tree:', featureTree);
      
      // Now use the config to load all test results
      // Documentation files are already embedded, so we don't need to fetch them
      const testResultsData = await loadTestResults(configs);
      
      return {
        documentation: {
          files: documentationFiles || [],
          timestamp: Date.now()
        },
        testResults: testResultsData.testResults,
        errors: testResultsData.errors || [],
        configs: configs,
        timestamp: new Date().toISOString(),
        workspaceRoot: window.location.origin,
        featureTree: featureTree
      };
    }


    async function loadTestResults(configs) {
      const testResults = {};
      const errors = [];
      
      if (!configs.runtimes) {
        console.log('No runtimes in config');
        return { testResults, errors };
      }
      
      // For each runtime and test, try to fetch the test results
      const promises = [];
      
      for (const [configKey, runtimeConfig] of Object.entries(configs.runtimes)) {
        const runtime = runtimeConfig.runtime;
        const tests = runtimeConfig.tests || [];
        
        console.log(`Loading tests for ${configKey} (${runtime}): ${tests.length} tests`);
        
        for (const testName of tests) {
          // Try multiple possible paths for test results
          // The correct path structure is: testeranto/reports/{configKey}/{testName}/tests.json
          // Also try with sanitized test name
          
          const sanitizedTestName = testName.replace(/\//g, '_').replace(/\./g, '-');
          const possiblePaths = [
            // Primary correct path: HTML is at testeranto/reports/index.html
            // So test results are at ./{configKey}/{testName}/tests.json
            `./${configKey}/${testName}/tests.json`,
            // Alternative with sanitized test name
            `./${configKey}/${sanitizedTestName}/tests.json`,
            // From project root (go up one level then into testeranto/reports)
            `../testeranto/reports/${configKey}/${testName}/tests.json`,
            `../testeranto/reports/${configKey}/${sanitizedTestName}/tests.json`,
            // Using runtime instead of configKey (for backward compatibility)
            `./${runtime}/${testName}/tests.json`,
            `./${runtime}/${sanitizedTestName}/tests.json`,
            `../testeranto/reports/${runtime}/${testName}/tests.json`,
            `../testeranto/reports/${runtime}/${sanitizedTestName}/tests.json`,
            // Absolute-like paths (may work on GitHub Pages)
            `/testeranto/reports/${configKey}/${testName}/tests.json`,
            `/testeranto/reports/${configKey}/${sanitizedTestName}/tests.json`,
            `/testeranto/reports/${runtime}/${testName}/tests.json`,
            `/testeranto/reports/${runtime}/${sanitizedTestName}/tests.json`,
          ];
          
          promises.push(
            fetchTestResultWithMultiplePaths(possiblePaths, configKey, testName, testResults, errors)
          );
        }
      }
      
      // Wait for all promises to settle (both fulfilled and rejected)
      await Promise.allSettled(promises);
      
      console.log(`Loaded ${Object.keys(testResults).length} test results, encountered ${errors.length} errors`);
      
      // Return both test results and errors
      return { testResults, errors };
    }

    async function fetchTestResultWithMultiplePaths(paths, configKey, testName, testResults, errors) {
      const key = `${configKey}/${testName}`;
      let lastError = null;
      
      for (const path of paths) {
        try {
          const response = await fetch(path);
          if (response.ok) {
            const data = await response.json();
            testResults[key] = {
              ...data,
              _sourcePath: path
            };
            console.log(`Loaded test results from: ${path}`);
            return; // Success, stop trying other paths
          } else {
            // Store the HTTP error
            lastError = {
              type: 'http',
              status: response.status,
              statusText: response.statusText,
              path: path,
              configKey,
              testName
            };
            console.warn(`HTTP ${response.status} for ${path}`);
          }
        } catch (error) {
          // Store network or other errors
          lastError = {
            type: 'network',
            error: error.message,
            path: path,
            configKey,
            testName
          };
          console.warn(`Network error for ${path}: ${error.message}`);
          // Continue to next path
        }
      }
      
      // If we get here, all paths failed
      const errorMessage = `Could not find test results for ${configKey}/${testName}`;
      console.warn(errorMessage);
      
      // Add to errors array
      errors.push({
        configKey,
        testName,
        message: errorMessage,
        lastAttempt: lastError,
        triedPaths: paths
      });
      
      // Still add an entry to testResults to indicate missing data
      testResults[key] = {
        _error: true,
        _message: errorMessage,
        _lastAttempt: lastError,
        _triedPaths: paths
      };
    }
  </script>
</body>
</html>
