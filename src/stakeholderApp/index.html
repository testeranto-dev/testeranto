<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testeranto - Stakeholder Report</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }

    #root {
      min-height: 100vh;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="loading">
      <h2>Loading Testeranto Stakeholder Report...</h2>
    </div>
  </div>

  <script type="module">
    // Wait for the stakeholder app to be loaded
    async function initApp() {
      const root = document.getElementById('root');

      try {
        // Import the stakeholder app module
        const { renderApp } = await import('/testeranto/reports/index.js');
        renderApp(root);
      } catch (error) {
        console.error('Failed to load stakeholder report:', error);
        root.innerHTML = `
          <div style="padding: 40px; text-align: center;">
            <h1 style="color: #d32f2f;">Error Loading Report</h1>
            <p>${error.message}</p>
            <p>Please make sure the Testeranto server has generated the report files.</p>
            <details style="text-align: left; max-width: 800px; margin: 20px auto;">
              <summary>Technical Details</summary>
              <pre style="background: #f5f5f5; padding: 10px; overflow: auto;">${error.stack}</pre>
            </details>
          </div>
        `;
      }
    }

    // Start the app when the DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>
</body>

</html>
